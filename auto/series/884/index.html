tail-vw-taigun":133,"detail-honda-crv":144,"detail-kia-sonet":155,"detail-ford-territory":165,"detail-mazda-cx5":176,"detail-nissan-xtrail":187,"detail-vw-tiguan":196,"detail-nissan-magnite":205,"detail-mazda-cx30":215,"home-hyundai-creta":225,"home-mazda-cx3":230,"home-gwm-haval-jolion":235,"home-suzuki-jimny":240,"home-honda-hrv":245,"home-vw-taigun":250,"home-honda-crv":255,"home-kia-sonet":260,"home-ford-territory":265,"home-mazda-cx5":270,"home-nissan-xtrail":275,"home-vw-tiguan":280,"home-nissan-magnite":285,"home-mazda-cx30":290,"home-intro":295,"home-cava":309,"home-highlights":317,"quote-intro":322,"finance-intro":330,"finance-rfc":335,"finance-postal":340},{"id":6,"blocks":7},"cava-hyundai-creta",[8],{"type":9,"text":10},"paragraph","Si estás viendo la \u003Cb>Creta\u003C/b>, te la resumo fácil: es una SUV muy práctica y equilibrada para el día a día. Es cómoda, fácil de manejar en ciudad, ahorradora y con buen espacio para la familia, así que como coche de uso diario cumple muy bien. Ahora, siendo directo: no es una SUV potente ni deportiva, el interior en algunas partes se siente básico y en carretera el ruido puede mejorar. Además, hay diferencias importantes entre versiones en equipamiento. En resumen, si quieres algo cómodo, económico y sin complicaciones para uso familiar, es una opción muy segura; pero si buscas más potencia o acabados premium, vale la pena comparar.",{"id":12,"blocks":13},"cava-mazda-cx3",[14],{"type":9,"text":15},"Si estás viendo la \u003Cb>Mazda CX-3\u003C/b>, te la pongo claro: es un coche pensado para quien disfruta manejar. Tiene un manejo muy preciso, se siente ágil, cómodo en ciudad y además es bastante ahorrador, así que para el día a día funciona muy bien. Pero ojo, no es una SUV de espacio: la parte trasera y la cajuela son algo justas, más pensada para una o dos personas que para familia. En resumen, si quieres algo divertido de manejar, eficiente y para uso urbano, te va a encantar; pero si necesitas espacio, mejor ver otras opciones.",{"id":17,"blocks":18},"cava-gwm-haval-jolion",[19],{"type":9,"text":20},"Si estás viendo la \u003Cb>Haval Jolion\u003C/b>, te la resumo fácil: es de esas SUVs que destacan por espacio, comodidad y equipamiento. Se siente amplia, cómoda para la familia y en ciudades muy fácil de manejar, además el consumo está bastante bien para el día a día. Ahora, siendo honesto contigo: no es una SUV para manejar fuerte, el arranque puede sentirse algo lento y en carretera le cuesta un poco más. También hay detalles como los botones táctiles o el sistema que a veces responde lento, y la marca aún está ganando confianza en México. En general, si buscas algo cómodo, bien equipado y con buena relación precio‒valor, es una muy buena opción; pero si priorizas potencia o marca, vale la pena comparar un poco más.",{"id":22,"blocks":23},"cava-suzuki-jimny",[24],{"type":9,"text":25},"Si te gusta el \u003Cb>Jimny\u003C/b>, te digo claro cómo lo ven muchos usuarios: es más un coche de \"diversión\" que un SUV familiar. Es súper bueno para off-road, muy fácil de manejar en ciudad y tiene una personalidad que pocos coches tienen. Pero ojo: el espacio es limitado (atrás y cajuela), la comodidad en carretera es normal y el consumo no es tan bajo como podrías pensar. Además, el equipamiento es más básico. En pocas palabras, si lo quieres para aventuras o como segundo coche, te va a encantar; pero como único coche familiar puede quedarse corto.",{"id":27,"blocks":28},"cava-honda-hrv",[29],{"type":9,"text":30},"Si estás viendo la \u003Cb>HR-V\u003C/b>, te digo cómo la están percibiendo muchos usuarios: es de esos coches muy balanceados, pensados para el día a día. Tiene buen espacio (sobre todo atrás), es cómoda, fácil de manejar en ciudad y bastante confiable. Además, el consumo se mantiene en un rango razonable (más o menos 10‒14 km/L), así que tampoco te va a salir caro mantenerla. Ahora, siendo directo contigo: no es una SUV para correr. La potencia cumple, pero en carretera — sobre todo arriba de 100 km/h — ya se siente más justa. También hay varias quejas de ruidos interiores y de aislamiento, y el sistema multimedia es bastante básico. Entonces, si quieres algo práctico, cómodo y sin complicaciones para uso diario y familiar, es una muy buena opción. Pero si buscas algo más silencioso, con mejor tecnología o más potencia, ahí sí te conviene comparar un poco más antes de decidir.",{"id":32,"blocks":33},"cava-vw-taigun",[34],{"type":9,"text":35},"Si lo que buscas es un SUV práctico para el día a día, el \u003Cb>Taigun\u003C/b> es de esos coches que cumplen muy bien: es ágil, fácil de manejar en ciudad, ahorra gasolina (alrededor de 14 km/L) y en general se siente confiable para uso familiar. Además, el diseño gusta bastante y al manejarlo se siente ligero y con buena respuesta. Ahora, siendo totalmente honesto contigo, también tiene sus detalles: la cajuela es algo justa si viajas con mucho equipaje, el interior tiene varios plásticos duros y en tráfico pesado la caja puede dar pequeños tirones. El espacio trasero cumple, pero no es el más amplio del segmento. En resumen, es una muy buena opción si quieres algo económico, práctico y para ciudad; pero si para ti es clave el espacio o una sensación más premium, vale la pena comparar un poco más antes de decidir.",{"id":37,"blocks":38},"cava-honda-crv",[39],{"type":9,"text":40},"Si estás buscando una SUV familiar de esas que compras con tranquilidad, la \u003Cb>CR-V\u003C/b> es justo ese tipo de coche: muy equilibrada, amplia, cómoda y fácil de manejar. Además, tiene muy buena reputación y es conocida por su confiabilidad, algo que muchos usuarios valoran mucho. Eso sí, te soy honesto: no es la más llamativa en interior o tecnología, el sistema multimedia es básico y el aislamiento de ruido podría mejorar, sobre todo en carretera. El consumo tampoco es el más bajo, pero se mantiene en un nivel aceptable. En resumen, si quieres una SUV práctica, confiable y para uso familiar, es una apuesta segura; pero si buscas más tecnología o lujo, vale la pena comparar otras opciones.",{"id":42,"blocks":43},"cava-kia-sonet",[44],{"type":9,"text":45},"Si estás buscando un SUV pequeño para ciudad, este modelo es justo ese tipo de coche que muchos usuarios recomiendan: fácil de manejar, dirección ligera y muy práctico para el tráfico diario. Además, el consumo es uno de sus puntos fuertes (alrededor de 18 km/L), así que en ahorro realmente cumple muy bien.",{"id":47,"blocks":48},"cava-ford-territory",[49],{"type":9,"text":50},"Este modelo destaca claramente por su espacio: es muy amplio tanto en la parte delantera como trasera, ideal para uso familiar y viajes con niños. Además, tiene un diseño atractivo, buen nivel de acabados y una conducción cómoda, con potencia suficiente y cambios suaves pensados para el día a día. Como puntos a considerar, algunos usuarios mencionan ruido en carretera, vibraciones del motor en ciertas ocasiones y asientos delanteros algo justos para viajes largos. En general, es una opción muy recomendable si priorizas espacio, comodidad y uso familiar.",{"id":52,"blocks":53},"cava-mazda-cx5",[54],{"type":9,"text":55},"El \u003Cb>Mazda CX-5\u003C/b> es un SUV muy valorado por su manejo: dirección precisa, buena respuesta del motor y una sensación de conducción muy sólida y deportiva. Además, destaca por su diseño atractivo, buena calidad general y un consumo eficiente alrededor de 11‒12 km/L. Eso sí, varios usuarios mencionan que el espacio trasero es algo justo frente a rivales, los asientos pueden sentirse firmes en viajes largos y los frenos requieren adaptación. En general, es una excelente opción si priorizas manejo y calidad sobre espacio interior.",{"id":57,"blocks":58},"cava-nissan-xtrail",[59],{"type":9,"text":60},"El \u003Cb>Nissan X-Trail\u003C/b> es un SUV muy enfocado en la familia: destaca por su gran espacio, asientos muy cómodos y una conducción suave y estable, ideal tanto para ciudad como para carretera. Además, tiene buen rendimiento de combustible y una capacidad off-road superior a muchos rivales del segmento. Eso sí, algunos usuarios mencionan que la potencia no es especialmente deportiva y que detalles como la segunda fila, la pintura o el sistema start-stop pueden mejorarse. En general, es una opción muy completa si buscas comodidad, espacio y versatilidad más que sensaciones deportivas.",{"id":62,"blocks":63},"cava-vw-tiguan",[64],{"type":9,"text":65},"La potencia responde bien, permite rebasar con confianza y en general se siente un coche robusto y cómodo para uso familiar y viajes largos. Eso sí, algunos propietarios mencionan detalles a considerar: el sistema multimedia puede ser lento o básico, el aislamiento acústico podría mejorar y la suspensión tiende a ser un poco firme. En general, es una excelente opción si buscas espacio, estabilidad y manejo, aceptando algunos puntos en tecnología y confort.",{"id":67,"blocks":68},"cava-nissan-magnite",[69],{"type":9,"text":70},"El \u003Cb>Nissan Magnite\u003C/b> es una opción que muchos usuarios eligen por su excelente relación costo-beneficio: es económico, confiable y muy práctico para el uso diario en ciudad. Destaca por su bajo consumo de combustible, facilidad de manejo y un espacio interior que cumple bien para familias pequeñas. Eso sí, varios propietarios coinciden en que el motor se queda corto, especialmente en carretera o al rebasar, donde le falta potencia. Además, el espacio trasero puede sentirse justo para personas altas y el equipamiento es más básico frente a algunos competidores. En general, es ideal si buscas ahorro y uso urbano más que desempeño.",{"id":72,"blocks":73},"cava-mazda-cx30",[74],{"type":9,"text":75},"El \u003Cb>Mazda CX-30\u003C/b> es un coche que muchos usuarios valoran por lo bien que se maneja: dirección precisa, cambios suaves y una conducción muy cómoda incluso si eres principiante. Además, el interior tiene buena calidad y el consumo de combustible suele ser bastante eficiente para el día a día. Eso sí, varios propietarios mencionan que el espacio trasero y la cajuela son algo justos, y que la suspensión puede sentirse un poco rígida en calles irregulares. En general, es una excelente opción si priorizas manejo y diseño sobre espacio interior.",{"id":77,"blocks":78},"detail-hyundai-creta",[79,81,83],{"type":9,"text":80},"Veo que estás revisando el \u003Cb>HYUNDAI Creta\u003C/b>. Muchas personas se interesan en este SUV por su buen espacio interior y equipamiento.",{"type":9,"text":82},"Dentro de los SUV compactos, es una opción bastante práctica para el uso diario y familiar. También noté que antes revisaste el \u003Cb>Mazda CX-3\u003C/b>. Estos dos modelos suelen compararse dentro del mismo segmento. Si quieres, puedo ayudarte a comparar espacio, equipamiento y experiencia de manejo entre los dos. ¿Quieres que te ayude a compararlos?",{"type":84,"label":85,"action":86},"button","Sí, compárame estos dos modelos",{"competitorId":87,"type":88,"seriesId":89},310,"compare",231,{"id":91,"blocks":92},"detail-mazda-cx3",[93,95,97],{"type":9,"text":94},"Veo que estás revisando el \u003Cb>Mazda CX-3\u003C/b>. Muchas personas se interesan en este modelo por su diseño deportivo y buena experiencia de manejo.",{"type":9,"text":96},"Su tamaño lo hace muy práctico para el uso diario en la ciudad. También noté que antes revisaste el \u003Cb>Volkswagen Taos\u003C/b>. Estos dos SUV suelen compararse dentro del mismo segmento. Si quieres, puedo ayudarte a comparar espacio, potencia y equipamiento entre los dos. ¿Quieres que te ayude a compararlos?",{"type":84,"label":85,"action":98},{"competitorId":99,"type":88,"seriesId":87},457,{"id":101,"blocks":102},"detail-gwm-haval-jolion",[103,105,107],{"type":9,"text":104},"El \u003Cb>HAVAL Jolion\u003C/b> es un SUV con diseño moderno y bastante equipamiento. Cuenta con motor 1.5 turbo que ofrece buena potencia y eficiencia. Su tamaño ofrece buen espacio interior para uso familiar.",{"type":9,"text":106},"En general, el Jolion es un SUV bien equipado, espacioso y con buena relación precio-valor. También noté que revisaste el Kia Seltos. Ambos son SUVs del mismo segmento y suelen compararse por diseño, equipamiento y uso diario. Si quieres, puedo ayudarte a comparar espacio, consumo y experiencia de manejo. ¿Quieres que te ayude a compararlos?",{"type":84,"label":85,"action":108},{"competitorId":109,"type":88,"seriesId":110},270,207,{"id":112,"blocks":113},"detail-suzuki-jimny",[114,116,118],{"type":9,"text":115},"Veo que estás revisando el \u003Cb>Suzuki Jimny\u003C/b>. Muchas personas se interesan en este modelo por su capacidad off-road y diseño único.",{"type":9,"text":117},"También noté que revisaste el \u003Cb>MG MG3\u003C/b>. Aunque son modelos diferentes, algunos usuarios los comparan según sus necesidades de uso. Si quieres, puedo ayudarte a comparar espacio, uso diario y estilo. ¿Quieres que te ayude a compararlos?",{"type":84,"label":85,"action":119},{"competitorId":120,"type":88,"seriesId":121},336,421,{"id":123,"blocks":124},"detail-honda-hrv",[125,127,129],{"type":9,"text":126},"Veo que estás revisando el \u003Cb>Honda HR-V\u003C/b>. Muchas personas lo eligen por su espacio interior y confiabilidad.",{"type":9,"text":128},"También noté que revisaste el \u003Cb>Toyota RAV4\u003C/b>. Estos dos SUV suelen compararse con frecuencia. Si quieres, puedo ayudarte a comparar espacio, equipamiento y experiencia de manejo. ¿Quieres que te ayude a compararlos?",{"type":84,"label":85,"action":130},{"competitorId":131,"type":88,"seriesId":132},546,220,{"id":134,"blocks":135},"detail-vw-taigun",[136,138,140],{"type":9,"text":137},"Veo que estás revisando el \u003Cb>Volkswagen Taigun\u003C/b>. Muchas personas se interesan en este modelo por su conducción estable y calidad alemana.",{"type":9,"text":139},"También noté que revisaste el \u003Cb>Nissan Kicks\u003C/b>. Estos dos SUV suelen compararse dentro del mismo segmento. Si quieres, puedo ayudarte a comparar espacio, equipamiento y experiencia de manejo. ¿Quieres que te ayude a compararlos?",{"type":84,"label":85,"action":141},{"competitorId":142,"type":88,"seriesId":143},353,461,{"id":145,"blocks":146},"detail-honda-crv",[147,149,151],{"type":9,"text":148},"Veo que estás revisando el \u003Cb>Honda CR-V\u003C/b>. Es un SUV que muchas familias consideran cuando buscan un auto práctico.",{"type":9,"text":150},"Es bastante popular por su espacio interior, conducción cómoda y buena reputación. También noté que antes revisaste el \u003Cb>Nissan X-Trail\u003C/b>. Estos dos modelos suelen compararse dentro del segmento de SUV familiares. Si quieres, puedo ayudarte a comparar espacio, equipamiento y experiencia de uso entre los dos. ¿Quieres que te ayude a compararlos?",{"type":84,"label":85,"action":152},{"competitorId":153,"type":88,"seriesId":154},358,214,{"id":156,"blocks":157},"detail-kia-sonet",[158,160,162],{"type":9,"text":159},"Veo que estás revisando el \u003Cb>KIA Sonet\u003C/b>. Muchas personas se interesan en este modelo por su diseño moderno y buen equipamiento.",{"type":9,"text":161},"Dentro del segmento de SUV compactos, es un modelo práctico y fácil de manejar para la ciudad. También noté que antes revisaste el \u003Cb>HYUNDAI Creta\u003C/b>. Estos dos modelos suelen compararse bastante dentro del mismo segmento. Si quieres, puedo ayudarte a comparar espacio, equipamiento y precio entre los dos. ¿Quieres que te ayude a compararlos?",{"type":84,"label":85,"action":163},{"competitorId":89,"type":88,"seriesId":164},275,{"id":166,"blocks":167},"detail-ford-territory",[168,170,172],{"type":9,"text":169},"Veo que estás revisando el \u003Cb>Ford Territory\u003C/b>. Muchas personas se interesan en este modelo por su espacio interior y tecnología.",{"type":9,"text":171},"También noté que revisaste el \u003Cb>KIA Sportage\u003C/b>. Estos dos SUV suelen compararse dentro del segmento familiar. Si quieres, puedo ayudarte a comparar espacio, equipamiento y experiencia de manejo. ¿Quieres que te ayude a compararlos?",{"type":84,"label":85,"action":173},{"competitorId":174,"type":88,"seriesId":175},273,165,{"id":177,"blocks":178},"detail-mazda-cx5",[179,181,183],{"type":9,"text":180},"Veo que estás revisando el \u003Cb>Mazda CX-50\u003C/b>. Muchas personas se interesan en este modelo por su diseño y buena experiencia de manejo.",{"type":9,"text":182},"Su tamaño y espacio interior son bastante competitivos dentro del segmento de SUV medianos, y además ofrece una conducción bastante agradable. También noté que antes revisaste el \u003Cb>Volkswagen Tiguan\u003C/b>. Estos dos modelos suelen compararse dentro del mismo segmento. Si quieres, puedo ayudarte a comparar espacio, potencia y equipamiento entre los dos. ¿Quieres que te ayude a compararlos?",{"type":84,"label":85,"action":184},{"competitorId":185,"type":88,"seriesId":186},453,306,{"id":188,"blocks":189},"detail-nissan-xtrail",[190,192,194],{"type":9,"text":191},"Ya habías revisado el \u003Cb>Nissan X-Trail\u003C/b> y ahora estás viendo su página de detalles, así que parece que este SUV realmente te interesa.",{"type":9,"text":193},"Muchas familias consideran el X-Trail porque ofrece buen espacio interior y una conducción cómoda para viajes largos. También noté que antes revisaste el \u003Cb>Volkswagen Tiguan\u003C/b>. Estos dos modelos suelen compararse dentro del segmento de SUV familiares. Si estás pensando entre los dos, puedo ayudarte a comparar espacio, equipamiento y experiencia de manejo. ¿Quieres que te ayude a compararlos?",{"type":84,"label":85,"action":195},{"competitorId":185,"type":88,"seriesId":153},{"id":197,"blocks":198},"detail-vw-tiguan",[199,201,203],{"type":9,"text":200},"Veo que ya revisaste el \u003Cb>Volkswagen Tiguan\u003C/b> y ahora estás viendo su página de detalles, así que parece que este SUV realmente te interesa.",{"type":9,"text":202},"En este segmento, el Tiguan es muy popular por su amplio espacio, conducción estable y calidad de estilo alemán. También noté que antes revisaste el \u003Cb>Nissan X-Trail\u003C/b>. Estos dos modelos suelen compararse mucho dentro del segmento de SUV familiares. Si estás considerando entre los dos, puedo ayudarte a comparar espacio, equipamiento y experiencia de manejo. ¿Quieres que te ayude a compararlos?",{"type":84,"label":85,"action":204},{"competitorId":153,"type":88,"seriesId":185},{"id":206,"blocks":207},"detail-nissan-magnite",[208,210,212],{"type":9,"text":209},"Veo que ya habías revisado la información del \u003Cb>Nissan Magnite\u003C/b> y ahora entraste a su página de detalles, así que parece que este modelo realmente te llamó la atención.",{"type":9,"text":211},"Dentro de los SUV compactos, el Magnite destaca por ser accesible y práctico para el uso diario en ciudad. También noté que antes miraste el \u003Cb>KIA Sonet\u003C/b>. Son dos modelos que suelen compararse bastante dentro del mismo segmento. Si estás considerando entre estos dos, puedo ayudarte a comparar espacio, equipamiento y precio. ¿Quieres que te ayude a compararlos?",{"type":84,"label":85,"action":213},{"competitorId":164,"type":88,"seriesId":214},351,{"id":216,"blocks":217},"detail-mazda-cx30",[218,220,222],{"type":9,"text":219},"Ya habías revisado el \u003Cb>Mazda CX-30\u003C/b> y ahora entraste a ver sus detalles, así que parece que realmente te interesa este modelo.",{"type":9,"text":221},"Dentro de su segmento, destaca por su diseño, buena calidad interior y una conducción agradable. También vi que antes revisaste el \u003Cb>Hyundai Creta\u003C/b> 8 veces. Son dos modelos que suelen compararse mucho. ¿Quieres que te ayude a compararlos?",{"type":84,"label":85,"action":223},{"competitorId":89,"type":88,"seriesId":224},302,{"id":226,"blocks":227},"home-hyundai-creta",[228],{"type":9,"text":229},"El \u003Cb>HYUNDAI Creta\u003C/b> es un SUV compacto conocido por su buen espacio interior y equipamiento. Normalmente cuenta con motores de 1.5L o 2.0L, con potencia suficiente para el uso diario y un consumo de combustible bastante eficiente. Su tamaño de alrededor de 4.3 metros ofrece buen espacio interior, especialmente en los asientos traseros. Además, incluye equipamiento práctico como pantalla central, conectividad inteligente y cámara de reversa. En general, el Creta es un SUV espacioso, bien equipado y muy práctico para el uso diario.",{"id":231,"blocks":232},"home-mazda-cx3",[233],{"type":9,"text":234},"El \u003Cb>Mazda CX-3\u003C/b> es un SUV compacto con un diseño deportivo y fácil de manejar. Cuenta con un motor 2.0L de alrededor de 148 hp, suficiente para el uso diario en ciudad y con una conducción bastante suave. Su tamaño cercano a los 4.3 metros lo hace práctico para moverse y estacionar en la ciudad. Mazda suele enfocarse mucho en la experiencia de manejo, por lo que el CX-3 ofrece buena sensación al volante y un interior con buena calidad. En general, es un SUV con estilo, fácil de conducir y muy práctico para la ciudad.",{"id":236,"blocks":237},"home-gwm-haval-jolion",[238],{"type":9,"text":239},"El \u003Cb>HAVAL Jolion\u003C/b> es un SUV con diseño moderno y bastante equipamiento. Cuenta con motor 1.5 turbo que ofrece buena potencia y eficiencia. Su tamaño cercano a los 4.5 metros ofrece buen espacio interior. Además incluye varias funciones tecnológicas y de asistencia a la conducción. En general, el Jolion es un SUV bien equipado, espacioso y con buena relación precio-valor.",{"id":241,"blocks":242},"home-suzuki-jimny",[243],{"type":9,"text":244},"El \u003Cb>Suzuki Jimny\u003C/b> es un SUV pequeño pensado para el off-road. Cuenta con tracción 4x4 y estructura tipo todoterreno, lo que le da muy buena capacidad fuera de carretera. Además, su tamaño compacto lo hace fácil de manejar en la ciudad. En general, el Jimny es un SUV pequeño, con mucho carácter y gran capacidad off-road.",{"id":246,"blocks":247},"home-honda-hrv",[248],{"type":9,"text":249},"El \u003Cb>Honda HR-V\u003C/b> es un SUV compacto con diseño moderno y buen espacio interior. Cuenta con motor 1.5L que ofrece conducción suave y buen consumo de combustible. El interior es bastante práctico para pasajeros y equipaje. En general, el HR-V es un SUV confiable, cómodo y muy adecuado para uso familiar.",{"id":251,"blocks":252},"home-vw-taigun",[253],{"type":9,"text":254},"El \u003Cb>Volkswagen Taigun\u003C/b> es un SUV compacto con diseño moderno y conducción bastante estable. Cuenta con motores turbo de 1.0L o 1.5L que ofrecen buen equilibrio entre potencia y eficiencia para el uso diario o viajes en carretera. Su tamaño es práctico para la ciudad y fácil de estacionar. En general, el Taigun es un SUV estable, cómodo y práctico para el uso urbano.",{"id":256,"blocks":257},"home-honda-crv",[258],{"type":9,"text":259},"El \u003Cb>Honda CR-V\u003C/b> es uno de los SUV familiares más populares, conocido por su espacio, confiabilidad y buen consumo de combustible. Cuenta con un motor turbo de 1.5L con alrededor de 190 hp, que ofrece buen equilibrio entre potencia y eficiencia. Su tamaño cercano a los 4.7 metros proporciona un interior amplio, con buen espacio para pasajeros y equipaje. La conducción es cómoda y fácil para el uso diario o viajes largos. En general, el CR-V es un SUV espacioso, confiable y muy adecuado para la familia.",{"id":261,"blocks":262},"home-kia-sonet",[263],{"type":9,"text":264},"El \u003Cb>KIA Sonet\u003C/b> es un SUV compacto con un diseño moderno y bastante equipamiento. Cuenta con motores de 1.5L o 1.0 turbo, con potencia suficiente para el uso diario en ciudad y un consumo de combustible bastante eficiente. Su tamaño de alrededor de 4.1 metros lo hace ágil para manejar y fácil de estacionar. Uno de sus puntos fuertes es el equipamiento, ya que incluye pantalla central, conectividad inteligente y cámara de reversa. En general, el Sonet es un SUV moderno, práctico y bien equipado para la ciudad.",{"id":266,"blocks":267},"home-ford-territory",[268],{"type":9,"text":269},"El \u003Cb>Ford Territory\u003C/b> es un SUV pensado para quienes buscan espacio y tecnología para la familia. Cuenta con un motor 1.8 turbo que ofrece buena potencia para el uso diario y viajes en carretera. Su tamaño cercano a los 4.6 metros proporciona un interior amplio, con buen espacio para pasajeros y equipaje. Además incluye varias funciones tecnológicas como pantalla central grande, conectividad inteligente y asistencias de conducción. En general, el Territory es un SUV espacioso, bien equipado y muy adecuado para uso familiar.",{"id":271,"blocks":272},"home-mazda-cx5",[273],{"type":9,"text":274},"El \u003Cb>Mazda CX-50\u003C/b> es un SUV que destaca por su diseño deportivo y una experiencia de manejo muy agradable. Cuenta con un motor 2.5L de alrededor de 187 hp, con buena potencia para el uso diario y también para viajes en carretera. Su tamaño cercano a los 4.7 metros ofrece buen espacio interior, ideal para la familia o para salir el fin de semana. Mazda suele enfocarse mucho en la sensación de manejo, con una dirección precisa y buena estabilidad. Además, el interior tiene buena calidad. En general, el CX-50 es un SUV con estilo, cómodo y divertido de manejar.",{"id":276,"blocks":277},"home-nissan-xtrail",[278],{"type":9,"text":279},"El \u003Cb>Nissan X-Trail\u003C/b> es un SUV pensado para quienes buscan espacio y comodidad para la familia. Cuenta con un motor 2.5L de alrededor de 181 hp, que ofrece una conducción suave tanto para la ciudad como para viajes largos. Su tamaño cercano a los 4.6 metros proporciona un interior amplio, y algunas versiones incluso ofrecen configuración de 7 asientos. En el interior incluye pantalla central grande, conectividad inteligente y varias funciones de seguridad. En general, el X-Trail es un SUV espacioso, cómodo y muy práctico para uso familiar.",{"id":281,"blocks":282},"home-vw-tiguan",[283],{"type":9,"text":284},"El \u003Cb>Volkswagen Tiguan\u003C/b> es un SUV mediano que destaca por su espacio y estabilidad al manejar. Cuenta con un motor turbo 2.0L de alrededor de 184 hp, con buena potencia tanto para la ciudad como para viajes en carretera. Su longitud cercana a los 4.7 metros ofrece un interior amplio, con buen espacio para pasajeros y equipaje. En el interior incluye tablero digital, pantalla central grande y varias funciones de asistencia a la conducción. En general, el Tiguan es un SUV espacioso, cómodo y muy adecuado para uso familiar.",{"id":286,"blocks":287},"home-nissan-magnite",[288],{"type":9,"text":289},"El \u003Cb>Nissan Magnite\u003C/b> es un SUV compacto pensado para el uso diario en la ciudad. Cuenta con un motor turbo de 1.0L de alrededor de 100 hp, que ofrece buen equilibrio entre potencia y consumo de combustible. Su tamaño de aproximadamente 4 metros lo hace muy fácil de manejar y estacionar. En el interior incluye pantalla central de 8 pulgadas, cámara de reversa y conectividad inteligente para mayor comodidad. En general, el Magnite es un SUV accesible, práctico y fácil de conducir para la ciudad.",{"id":291,"blocks":292},"home-mazda-cx30",[293],{"type":9,"text":294},"El \u003Cb>Mazda CX-30\u003C/b> es un SUV compacto que combina buen diseño y una experiencia de manejo muy agradable. Cuenta con un motor 2.5L de alrededor de 191 hp, con buena potencia para el uso diario en ciudad o para viajes. Su tamaño es de aproximadamente 4.4 metros de largo, lo que lo hace cómodo de manejar y fácil de estacionar. El interior tiene buena calidad y también ofrece varias funciones de seguridad. En general, es un SUV con estilo, cómodo y divertido de manejar.",{"id":296,"blocks":297},"home-intro",[298,301,304],{"type":299,"text":300},"title","¡Bienvenido de nuevo, {{userName}}!👋",{"type":9,"text":302,"variant":303},"Soy tu asesor de autos Cavi, me alegra verte otra vez.\nVeo que estás viendo autos con mensualidades de 4000-8000.\n¿Quieres que te recomiende algunas opciones?","compact",{"type":84,"label":305,"action":306},"Sí",{"type":307,"presetId":308},"userPreset","Home",{"id":310,"blocks":311},"home-cava",[312,315],{"type":299,"text":313,"icon":314},"¡Ah, el"
